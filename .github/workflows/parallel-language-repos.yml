name: Parallel Language Repositories

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Define 30 parallel jobs
  create-repo-1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup git
        run: |
          git config --global user.name "Dippp10"
          git config --global user.email "deepikakarthik697@gmail.com"
      - name: Create Python repo
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USER: ${{ github.repository_owner }}
        run: |
          REPO="lang-python-$(date +%s)"
          curl -s -X POST -H "Authorization: token $TOKEN" -H "Accept: application/vnd.github+json" \
            https://api.github.com/user/repos -d "{\"name\":\"$REPO\",\"auto_init\":true}"
          git clone https://x-access-token:$TOKEN@github.com/$USER/$REPO.git
          cd $REPO
          mkdir src
          FILE="src/main.py"
          for i in $(seq 1 200); do
            echo "# Python sample line $i" >> $FILE
          done
          git add .
          git commit -m "Add Python code"
          git push
          cd ..
          rm -rf $REPO

  create-repo-2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
      - name: Create JavaScript repo
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USER: ${{ github.repository_owner }}
        run: |
          REPO="lang-javascript-$(date +%s)"
          curl -s -X POST -H "Authorization: token $TOKEN" -H "Accept: application/vnd.github+json" \
            https://api.github.com/user/repos -d "{\"name\":\"$REPO\",\"auto_init\":true}"
          git clone https://x-access-token:$TOKEN@github.com/$USER/$REPO.git
          cd $REPO
          mkdir src
          FILE="src/main.js"
          for i in $(seq 1 200); do
            echo "// JS sample line $i" >> $FILE
          done
          git add .
          git commit -m "Add JS code"
          git push
          cd ..
          rm -rf $REPO

  # ... Repeat similar jobs for remaining languages (TypeScript, Go, Rust, Kotlin, Dart, etc.) ...
